<!DOCTYPE html>
<html lang="en">
<head>
    <header style="text-align: center;">
        <div class="logo"><a href="index.html" style="text-decoration: none; color: white;">← BruChewie Home</a></div>
    </header>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BruChewie | Checkout</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .checkout-wrapper {
            background: white;
            border: 2px solid #8B4513;
            border-radius: 12px;
            padding: 25px;
            max-width: 500px;
            margin: 40px auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .summary-title {
            border-bottom: 2px dashed #8B4513;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        .cart-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 15px;
        }
        .fulfillment-options {
            margin: 20px 0;
            padding: 15px 0;
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
        }
        .option-label {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            cursor: pointer;
        }
        .total-display {
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: bold;
            margin: 15px 0;
            color: #8B4513;
        }
        .payment-method {
            background: #fdf6f0;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .confirm-btn {
            background-color: #28a745;
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
        }
        .confirm-btn:hover { background-color: #218838; }
    </style>
</head>
<body>

    <header style="text-align: center;">
        <div class="logo"><a href="index.html" style="text-decoration: none; color: #8B4513;">← Back to Shop</a></div>
    </header>

   <main>
    <div class="checkout-wrapper">
        <h2 class="summary-title">List of Product Selected</h2>
        
        <div id="cart-items-list">
            <p style="color: #888; font-style: italic; padding: 10px 0;">Loading your cart...</p>
        </div>

        <div class="fulfillment-options">
            <label class="option-label">
                <input type="radio" name="fulfillment" value="delivery" id="delivery-bruneimuara" checked onchange="renderCheckout()">
                <span>🚗 Delivery (Brunei-Muara) — <strong>BND$5.00</strong></span>
            </label> <br>
            <label class="option-label">
                <input type="radio" name="fulfillment" value="delivery" id="delivery-tutong" onchange="renderCheckout()">
                <span>🚗 Delivery (Tutong) — <strong>BND$6.00</strong></span>
            </label> <br>
             <label class="option-label">
                <input type="radio" name="fulfillment" value="delivery" id="delivery-temburong" onchange="renderCheckout()">
                <span>🚗 Delivery (Temburong) — <strong>BND$7.00</strong></span>
            </label> <br>
             <label class="option-label">
                <input type="radio" name="fulfillment" value="delivery" id="delivery-belait" onchange="renderCheckout()">
                <span>🚗 Delivery (Belait) — <strong>BND$8.00</strong></span>
            </label> <br>
            <label class="option-label">
                <input type="radio" name="fulfillment" value="pickup" id="pickup-radio" onchange="renderCheckout()">
                <span>🛍️ Pick up — <strong>BND$0.00</strong></span>
            </label>
        </div>

        <div class="cart-item">
            <span>Subtotal:</span>
            <span id="subtotal-val">BND$0.00</span>
        </div>
        <div class="cart-item">
            <span>Fulfillment Fee:</span>
            <span id="fee-val">BND$5.00</span>
        </div>
        
        <div class="total-display">
            <span>Total:</span>
            <span id="total-val">BND$0.00</span>
        </div>

        <div class="payment-method">
            <p><strong>Payment Option:</strong></p>
            <p>Contact us for Bank Details Account (BIBD / TAIB)</p>
            <p style="font-size: 11px; margin-top: 5px; color: #666;">*Pricing changes due to local district selected.</p>
        </div>

        <button class="confirm-btn" onclick="submitOrder()">Confirm Order</button>
    </div>
</main>

    <script src="script.js"></script>
</body>
</html>
