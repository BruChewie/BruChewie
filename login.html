<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BruChewie | Log In to Your Account</title>
    <link rel="stylesheet" href="style.css">
    <style>
        
        .auth-container {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 30px;
            margin-top: 40px;
        }
        .auth-box {
            background: white;
            border: 1px solid #ddd;
            padding: 30px;
            border-radius: 10px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .auth-box h2 {
            margin-bottom: 20px;
            color: #8B4513;
        }
        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .auth-btn {
            background-color: #8B4513;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
        .auth-btn:hover { background-color: #A0522D; }
    </style>
</head>
<body>

    <header style="text-align: center;">
        <div class="logo"><a href="index.html" style="text-decoration: none; color: white;">← BruChewie Home</a></div>
    </header>

    <main class="auth-container">
        <div class="auth-box">
            <h2>Log-In</h2>
            <form onsubmit="alert('Logged in successfully!'); return false;">
                <div class="form-group">
                    <label>Email / Username</label>
                    <input type="text" placeholder="Enter your email or username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="Enter password" required>
                </div>
                <button type="submit" class="auth-btn">Log-In</button>
            </form>
        </div>
    </main>

</body>
</html>
