<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <header style="text-align: center;">
        <div class="logo"><a href="index.html" style="text-decoration: none; color: white;">← BruChewie Home</a></div>
    </header>
    <title>BruChewie | Sign Up to Register</title>
    <div class="register-card">
            <div class="content">
                <marquee behavior="scroll" direction="left" scrollamount="10" style="color: white; font-weight: bold; font-size: 20px;">⟡⋆˙New to BruChewie? Sign up now to explore our delightful DCC treats!⋆˙⟡</marquee>
            </div>
        <p class="login-text">
                Already have an account?
                <a href="login.html"> Log in</a>
                </p>
    <link rel="stylesheet" href="style.css">
    <style>
        
        .auth-container {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 30px;
            margin-top: 40px;
        }
        .auth-box {
            background: white;
            border: 1px solid #ddd;
            padding: 30px;
            border-radius: 10px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .auth-box h2 {
            margin-bottom: 20px;
            color: #8B4513;
        }
        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .auth-btn {
            background-color: #8B4513;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
        .auth-btn:hover { background-color: #A0522D; }
    </style>
</head>

 <main class="auth-container">
        <div class="auth-box">
            <h2>Sign-Up</h2>
            <form onsubmit="alert('Account created successfully!'); return false;">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" placeholder="Choose username" required>
                </div>
                <div class="form-group">
                    <label>No. Phone</label>
                    <input type="tel" placeholder="+673 XXX XXXX" required>
                </div>
                <div class="form-group">
                    <label>Create Password</label>
                    <input type="password" placeholder="Min 6 characters" required>
                </div>
                <div class="form-group">
                    <label>Verify Password</label>
                    <input type="password" placeholder="Repeat password" required>
                </div>
                <button type="submit" class="auth-btn">Sign-Up</button>
            </form>
        </div>
    </main>
</html>
