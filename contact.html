<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BruChewie | Contact Us</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-image: url("bg.jpg");
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
            background-size: cover;
            min-height: 100vh;
            margin: 0; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .contact-container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            max-width: 900px;
            width: 90%;
            margin: 40px auto;
        }

        .contact-box {
            background: rgba(255, 255, 255, 0.96);
            border: 2px solid #8B4513;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            flex: 1;
            min-width: 280px;
        }

        .contact-title {
            color: #8B4513;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            border-bottom: 2px dashed #8B4513;
            padding-bottom: 10px;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            font-size: 15px;
            color: #333;
        }

        .info-icon {
            font-size: 24px;
            background: #fdf6f0;
            padding: 8px;
            border-radius: 50%;
            border: 1px solid #8B4513;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
            font-size: 14px;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            outline: none;
            font-size: 14px;
        }

        .form-group input:focus, .form-group textarea:focus {
            border-color: #8B4513;
        }

        .send-btn {
            background-color: #28a745;
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .send-btn:hover { background-color: #218838; }

        .whatsapp-btn {
            display: inline-block;
            background-color: #25D366;
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 5px;
        }
        .whatsapp-btn:hover { background-color: #1ebd58; }
    </style>
</head>
<body>

    <header style="width: 100%;">
        <nav class="navbar">
            <div class="logo-container">
                <img src="bruchewie logo.png" class="nav-circle-logo" width="60" height="60">
                <div class="logo">BruChewie</div>
            </div>
            <div class="search-box">
                <input type="text" placeholder="Search...">
                <button>🔍</button>
            </div>
            <ul class="nav-links">
                <li><a href="menu.html">Menu</a></li>
                <li><a href="signup.html">Register</a></li>
                <li><a href="login.html" class="icon-link">Profile</a></li>
                <li><a href="checkout.html" class="icon-link">Cart(<span id="cart-count">0</span>)</a></li>
            </ul>
        </nav>
    </header>

    <main class="contact-container">
        
        <div class="contact-box">
            <h2 class="contact-title">Get In Touch</h2>
            
            <div class="info-item">
                <div class="info-icon">📍</div>
                <div>
                    <strong>Location:</strong><br>
                    Brunei-Muara District, Brunei Darussalam
                </div>
            </div>

            <div class="info-item">
                <div class="info-icon">📞</div>
                <div>
                    <strong>Contact Phone / WhatsApp:</strong><br>
                    +673 821 1908 <br>
                    <a href="https://wa.me/6738211908" target="_blank" class="whatsapp-btn">💬 Chat on WhatsApp</a>
                </div>
            </div>

            <div class="info-item">
                <div class="info-icon">🕒</div>
                <div>
                    <strong>Baking Slots:</strong><br>
                    Monday-Thursday<br>
                    Pick up: anytime until further notice
                </div>
            </div>
        </div>

        <div class="contact-box">
            <h2 class="contact-title">Send a Message</h2>
            <form onsubmit="handleMessage(event)">
                <div class="form-group">
                    <label>Your Name</label>
                    <input type="text" id="contact-name" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="contact-email" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label>Message / Special Request</label>
                    <textarea id="contact-msg" rows="4" placeholder="Type your questions here..." required></textarea>
                </div>
                <button type="submit" class="send-btn">Submit Inquiry</button>
            </form>
        </div>

    </main>

    <script>
        function handleMessage(e) {
            e.preventDefault();
            const name = document.getElementById('contact-name').value;
            alert(`Thank you, ${name}! Your inquiry has been sent. We will get back to you shortly.`);
            document.getElementById('contact-name').value = '';
            document.getElementById('contact-email').value = '';
            document.getElementById('contact-msg').value = '';
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
